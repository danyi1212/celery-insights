name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  issues: read
  checks: write
  pull-requests: write

jobs:
  lint-backend:
    name: Lint backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync
      - name: Ruff check
        run: uv run ruff check
      - name: Ruff format
        run: uv run ruff format --check
      - name: ty check
        run: uv run ty check server/

  test-backend:
    name: Test backend
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync
      - name: Run pytest
        run: uv run pytest server --doctest-modules --junitxml=junit/test-results.xml --cov=server --cov-report=xml --cov-report=html -n auto
      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: junit/test-results.xml

  lint-frontend:
    name: Lint frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Oxlint
        run: bun run lint
      - name: Oxfmt
        run: bun run format
      - name: TypeScript
        run: bunx tsc --noEmit

  test-frontend:
    name: Test frontend
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Vitest
        run: bun run test

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-frontend, lint-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
      - name: Build E2E images
        uses: docker/bake-action@v6
        with:
          files: ./docker-bake.hcl
          targets: e2e
          load: true
      - name: Run E2E tests
        run: bun run e2e
        env:
          CI: "true"
          E2E_SKIP_BUILD: "1"
      - name: Publish Playwright summary
        uses: daun/playwright-report-summary@v3
        if: always() && hashFiles('playwright-report/results.json') != ''
        with:
          report-file: playwright-report/results.json
          report-tag: e2e
          comment-title: E2E test results
          job-summary: true
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
      - name: Upload traces on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/playwright/
      - name: Cleanup docker compose
        if: always()
        run: docker compose -f test_project/docker-compose.yml --profile interactive down -v --remove-orphans || true
