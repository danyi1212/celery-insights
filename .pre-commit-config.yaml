# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
exclude: ^frontend/app/services/server
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: check-xml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [ --fix=lf ]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.1
    hooks:
      - id: ruff
        files: \.py$
        types: [ file ]
      - id: ruff-format
        files: \.py$
        types: [ file ]

  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: uv run ty check server/
        language: system
        files: \.py$
        types: [file]
        pass_filenames: false

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bun run --cwd frontend eslint --max-warnings=0 app
        language: system
        files: ^frontend/app/.*\.[jt]sx?$
        types: [ file ]
        pass_filenames: false
