# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
ci:
  skip: [ty, oxlint, oxfmt, tsc, vitest]
exclude: ^(\.agents/|frontend/app/services/server)
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: check-xml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [ --fix=lf ]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff
        args: [--fix]
        files: \.py$
        types: [ file ]
      - id: ruff-format
        files: \.py$
        types: [ file ]

  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: uv run ty check server/
        language: system
        files: \.py$
        types: [file]
        pass_filenames: false

  - repo: local
    hooks:
      - id: oxlint
        name: oxlint
        entry: bun run lint-fix
        language: system
        files: ^(src|runtime|e2e|tooling)/.*\.[jt]sx?$|^(bun-entry|vite\.config|vitest\.config|vitest\.setup)\.ts$
        types: [ file ]
        pass_filenames: false

      - id: oxfmt
        name: oxfmt
        entry: bun run format-fix
        language: system
        files: ^(src|runtime|e2e|tooling)/.*\.[jt]sx?$|^(bun-entry|vite\.config|vitest\.config|vitest\.setup)\.ts$
        types: [ file ]
        pass_filenames: false

      - id: tsc
        name: tsc
        entry: bun run typecheck
        language: system
        files: ^(src|runtime|e2e|tooling)/.*\.[jt]sx?$|^(bun-entry|vite\.config|vitest\.config|vitest\.setup)\.ts$
        types: [ file ]
        pass_filenames: false

      - id: vitest
        name: vitest
        entry: bun run test
        language: system
        files: ^(src|runtime|e2e|tooling)/.*\.[jt]sx?$|^(bun-entry|vite\.config|vitest\.config|vitest\.setup)\.ts$
        types: [ file ]
        pass_filenames: false
